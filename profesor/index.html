<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel de Calificación - Docente</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <div class="login-container" id="contenido">
    <h1>Panel de Evaluación</h1>

    <div class="form-group">
      <label for="grupo">Selecciona el grupo:</label>
      <select id="grupo" required>
        <option value="">-- Selecciona --</option>
          <option value="Grupo1">Grupo 1 - Andrés</option>
          <option value="Grupo2">Grupo 2 - Valentina y Erick</option>
          <option value="Grupo3">Grupo 3 - Dayron y Alison</option>
          <option value="Grupo4">Grupo 4 - Edwin y Yesica</option>
          <option value="Grupo5">Grupo 5 - Samuel y Diego</option>
          <option value="Grupo6">Grupo 6 - Laura y Santiago</option>
          <option value="Grupo7">Grupo 7 - David y Faiber</option>
          <option value="Grupo8">Grupo 8 - Luciana y Juan</option>
          <option value="Grupo9">Grupo 9 - Yury y Samantha</option>
      </select>
    </div>

    <div class="form-group">
      <button onclick="mostrarFormularioPlaneacion()">🧾 Calificar Planeación</button>
      <button onclick="mostrarFormularioProtocolo()">📄 Calificar Protocolo</button>
      <button onclick="window.location.href='estadisticas.html'">📊 Ver estadísticas</button>
    </div>


    <div id="formulario"></div>

    <div id="mensaje" class="message"></div>

    <button onclick="window.location.href='../index.html'" style="margin-top: 20px;">Volver</button>
  </div>

  <!-- 🔗 Conexión con Firebase y el script del docente -->
  <script type="module" src="../firebase-setup.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
