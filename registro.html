<!-- registro.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Estudiantes</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="login-container">
    <h1>Registro de Usuario</h1>
    <form id="registroForm">
      <div class="form-group">
        <label for="grupo">Selecciona tu grupo:</label>
        <select id="grupo" required>
          <option value="">Selecciona tu grupo</option>
          <option value="Grupo1">Grupo 1 - Andrés</option>
          <option value="Grupo2">Grupo 2 - Valentina y Erick</option>
          <option value="Grupo3">Grupo 3 - Dayron y Alison</option>
          <option value="Grupo4">Grupo 4 - Edwin y Yesica</option>
          <option value="Grupo5">Grupo 5 - Samuel y Diego</option>
          <option value="Grupo6">Grupo 6 - Laura y Santiago</option>
          <option value="Grupo7">Grupo 7 - David y Faiber</option>
          <option value="Grupo8">Grupo 8 - Luciana y Juan</option>
          <option value="Grupo9">Grupo 9 - Yury y Samantha</option>
        </select>
      </div>

      <div class="form-group">
        <label for="email">Correo institucional:</label>
        <input type="email" id="email" required />
      </div>

      <div class="form-group">
        <label for="password">Crea una contraseña:</label>
        <input type="password" id="password" required minlength="6" />
      </div>

      <button type="submit">Registrarse</button>
    </form>

    <div id="mensaje" class="message"></div>
    <button onclick="window.location.href='login.html'" style="margin-top:20px;">¿Ya tienes cuenta? Inicia sesión</button>
  </div>

  <script type="module" src="registro.js"></script>
</body>
</html>
